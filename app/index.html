<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flickr Photo Finder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 id="appTitle">Flickr Photo Finder</h1>
          <p id="resultSummary">載入中</p>
        </div>
        <a id="sourceLink" class="source-link" href="https://www.flickr.com/" target="_blank" rel="noreferrer">Flickr</a>
      </header>

      <section class="overview" aria-label="資料庫概覽">
        <div class="overview-heading">
          <h2>資料庫概覽</h2>
          <p id="overviewSummary">載入中</p>
        </div>
        <div id="overviewGrid" class="overview-grid"></div>
      </section>

      <section class="toolbar" aria-label="篩選照片">
        <label class="search-field">
          <span>搜尋</span>
          <input id="searchInput" type="search" placeholder="志工、攤位、hero、贊助" autocomplete="off" />
        </label>

        <label>
          <span>用途</span>
          <select id="useFilter"></select>
        </label>

        <label>
          <span>氛圍</span>
          <select id="moodFilter"></select>
        </label>

        <label>
          <span>場景</span>
          <select id="sceneFilter"></select>
        </label>

        <label>
          <span>人數</span>
          <select id="peopleCountFilter"></select>
        </label>

        <label>
          <span>主體</span>
          <select id="subjectTypeFilter"></select>
        </label>

        <label>
          <span>贊助品項</span>
          <select id="sponsorshipItemFilter"></select>
        </label>

        <label>
          <span>公開狀態</span>
          <select id="publicStatusFilter"></select>
        </label>

        <label>
          <span>推薦優先度</span>
          <select id="priorityFilter"></select>
        </label>

        <label>
          <span>整理狀態</span>
          <select id="curationStatusFilter"></select>
        </label>

        <label>
          <span>素材包</span>
          <select id="collectionFilter"></select>
        </label>

        <button id="resetButton" type="button">清除</button>
      </section>

      <section id="photoGrid" class="photo-grid" aria-live="polite"></section>
    </main>

    <template id="photoCardTemplate">
      <article class="photo-card">
        <a class="photo-link" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
        </a>
        <div class="photo-body">
          <div class="photo-meta">
            <strong class="photo-title"></strong>
            <span class="photo-year"></span>
          </div>
          <dl class="details"></dl>
          <p class="notes"></p>
          <div class="photo-actions">
            <a class="photo-action large-image-link" target="_blank" rel="noreferrer">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              <span>大圖</span>
            </a>
            <a class="photo-action original-image-link" target="_blank" rel="noreferrer">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              <span>原圖</span>
            </a>
            <button class="copy-flickr-link-button" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 8h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2Z" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4a2 2 0 0 1 2-2h10c1.1 0 2 .9 2 2" />
              </svg>
              <span>Flickr 連結</span>
            </button>
            <button class="copy-finder-link-button" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 8h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2Z" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4a2 2 0 0 1 2-2h10c1.1 0 2 .9 2 2" />
              </svg>
              <span>本頁連結</span>
            </button>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./main.js"></script>
  </body>
</html>

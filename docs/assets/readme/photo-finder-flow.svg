<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SITCON Flickr Photo Finder 的角色定位</title>
  <desc id="desc">Flickr 是照片來源，正式照片索引放在 Google Sheets；這個專案提供資料規則、匯入工具、AI 輔助與使用維護介面，讓公開搜尋前端與常用 AI 助手讀同一份索引。</desc>
  <defs>
    <style>
      .bg { fill: #f5f6f8; }
      .title { fill: #1e252d; font: 760 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #485562; font: 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .hub { fill: #e8f6ef; stroke: #0f766e; stroke-width: 3; }
      .source { fill: #eaf1ff; stroke: #8ea9e8; stroke-width: 2; }
      .use { fill: #f4efff; stroke: #b6a0dc; stroke-width: 2; }
      .tool { fill: #ffffff; stroke: #dce2e8; stroke-width: 2; }
      .tool-head { fill: #fff4df; stroke: #e0ad55; stroke-width: 2; }
      .feedback { fill: #fff7ed; stroke: #f0b35c; stroke-width: 2; }
      .label { fill: #1e252d; font: 760 21px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .hub-label { fill: #0b5f59; font: 760 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #485562; font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #667481; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #94a3b8; stroke-width: 2.4; stroke-dasharray: 7 8; marker-end: url(#arrow-soft); }
      .section-label { fill: #0b5f59; font: 760 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="70" y="72">這個專案如何支撐照片索引</text>
  <text class="subtitle" x="70" y="108">照片留在 Flickr，正式照片索引放在 Google Sheets；專案提供規則、工具與介面，讓不同角色用同一份資料找圖與維護。</text>

  <g transform="translate(70 156)">
    <rect class="source" x="0" y="190" width="190" height="116" rx="18"/>
    <text class="label" x="32" y="234">Flickr</text>
    <text class="body" x="32" y="264">公開照片</text>
    <text class="body" x="32" y="288">原始相簿來源</text>

    <rect class="hub" x="470" y="164" width="260" height="168" rx="22"/>
    <text class="hub-label" x="518" y="214">正式照片索引</text>
    <text class="hub-label" x="518" y="246">Google Sheets</text>
    <text class="body" x="518" y="280">志工整理、審核與協作</text>
    <text class="body" x="518" y="306">公開搜尋與 AI 都讀這份資料</text>

    <rect class="use" x="870" y="78" width="220" height="112" rx="18"/>
    <text class="label" x="910" y="122">公開搜尋前端</text>
    <text class="body" x="910" y="154">依社群、活動回顧</text>
    <text class="body" x="910" y="178">贊助成果、新聞稿找圖</text>

    <rect class="use" x="870" y="224" width="220" height="112" rx="18"/>
    <text class="label" x="910" y="268">常用 AI 助手</text>
    <text class="body" x="910" y="300">用自然語言探索</text>
    <text class="body" x="910" y="324">候選照片清單</text>

    <rect class="use" x="870" y="370" width="220" height="112" rx="18"/>
    <text class="label" x="910" y="414">人工整理與審核</text>
    <text class="body" x="910" y="446">補資料、確認狀態</text>
    <text class="body" x="910" y="470">發布前回 Flickr 查脈絡</text>

    <path class="arrow" d="M 190 248 H 470"/>
    <path class="arrow" d="M 730 214 C 788 168 812 134 870 134"/>
    <path class="arrow" d="M 730 248 H 870"/>
    <path class="arrow" d="M 730 292 C 790 348 814 426 870 426"/>
    <path class="arrow-soft" d="M 870 426 C 790 512 668 532 600 528 C 510 524 438 488 382 438"/>

    <text class="section-label" x="322" y="26">這個專案提供</text>

    <rect class="tool-head" x="280" y="48" width="160" height="88" rx="16"/>
    <text class="label" x="316" y="84">資料規則</text>
    <text class="small" x="316" y="110">欄位、分類</text>
    <text class="small" x="316" y="130">顯示文字、驗證</text>

    <rect class="tool" x="280" y="360" width="160" height="96" rx="16"/>
    <text class="label" x="316" y="396">匯入工具</text>
    <text class="small" x="316" y="422">相簿盤點</text>
    <text class="small" x="316" y="442">照片匯入、dry-run</text>

    <rect class="tool" x="470" y="48" width="160" height="88" rx="16"/>
    <text class="label" x="506" y="84">AI 輔助</text>
    <text class="small" x="506" y="110">AI 標記、檢查</text>
    <text class="small" x="506" y="130">報表、更新計畫</text>

    <rect class="tool" x="660" y="48" width="170" height="88" rx="16"/>
    <text class="label" x="696" y="84">使用介面</text>
    <text class="small" x="696" y="110">搜尋前端</text>
    <text class="small" x="696" y="130">Apps Script、文件</text>

    <path class="arrow-soft" d="M 360 136 C 384 168 422 190 470 208"/>
    <path class="arrow-soft" d="M 360 360 C 390 322 424 292 470 274"/>
    <path class="arrow-soft" d="M 550 136 V 164"/>
    <path class="arrow-soft" d="M 730 136 C 724 150 724 156 716 170"/>

    <rect class="feedback" x="288" y="496" width="430" height="76" rx="18"/>
    <text class="label" x="324" y="536">找不到 / 不好找</text>
    <text class="body" x="324" y="562">回頭改善欄位、分類、搜尋體驗與 AI 標記規則</text>
  </g>
</svg>

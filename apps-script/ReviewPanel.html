<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Noto Sans TC", sans-serif;
        font-size: 13px;
        color: #1f2933;
      }

      body {
        margin: 0;
        background: #f7f8fa;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .panel {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .toolbar,
      .photo,
      .form,
      .status {
        background: #fff;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        padding: 8px;
      }

      .toolbar {
        display: grid;
        gap: 8px;
      }

      .nav-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 6px;
      }

      .row-loader {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 6px;
      }

      .row-loader input {
        min-width: 0;
      }

      .photo {
        align-items: start;
        display: grid;
        gap: 8px;
        grid-template-columns: 96px minmax(0, 1fr);
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .photo img {
        aspect-ratio: 4 / 3;
        grid-row: span 3;
        max-height: 96px;
        object-fit: contain;
        background: #eef1f5;
        border-radius: 4px;
        width: 100%;
      }

      .photo-title {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .photo-context {
        display: grid;
        gap: 4px;
      }

      .photo-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      a {
        color: #075985;
      }

      .form {
        display: grid;
        gap: 8px;
      }

      .field {
        display: grid;
        gap: 4px;
      }

      .field-heading {
        align-items: center;
        display: flex;
        gap: 6px;
        justify-content: space-between;
      }

      .field.hidden {
        display: none;
      }

      .field.invalid input,
      .field.invalid select,
      .field.invalid textarea,
      .field.invalid .selected-list {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.08);
      }

      label {
        font-weight: 700;
      }

      .help-button {
        align-items: center;
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 50%;
        color: #475569;
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 700;
        height: 22px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        width: 22px;
      }

      .help-button[aria-expanded="true"] {
        background: #e6f3f1;
        border-color: #99c8c1;
        color: #134e4a;
      }

      .meta {
        color: #5b6778;
        font-size: 12px;
        line-height: 1.4;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        padding: 7px;
        background: #fff;
      }

      textarea {
        min-height: 62px;
        resize: vertical;
      }

      input[readonly] {
        background: #eef1f5;
        color: #4b5563;
      }

      .multi-select {
        position: relative;
      }

      .selected-list {
        align-items: center;
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        min-height: 38px;
        padding: 4px;
      }

      .selected-list:focus-within {
        border-color: #0f766e;
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
      }

      .selected-token {
        align-items: center;
        background: #e6f3f1;
        border: 1px solid #99c8c1;
        border-radius: 4px;
        color: #134e4a;
        display: inline-flex;
        font-size: 12px;
        gap: 4px;
        line-height: 1.2;
        max-width: 100%;
        min-height: 24px;
        padding: 2px 4px 2px 7px;
      }

      .selected-token.unknown {
        background: #fffbeb;
        border-color: #f59e0b;
        color: #7c2d12;
      }

      .selected-token span {
        overflow-wrap: anywhere;
      }

      .selected-token button {
        align-items: center;
        background: transparent;
        border: 0;
        border-radius: 3px;
        color: inherit;
        cursor: pointer;
        display: inline-flex;
        font-size: 16px;
        font-weight: 700;
        height: 20px;
        justify-content: center;
        line-height: 1;
        min-height: 20px;
        padding: 0;
        width: 20px;
      }

      .selected-token button:hover {
        background: rgba(15, 23, 42, 0.12);
      }

      .combo-input {
        border: 0;
        flex: 1 1 120px;
        min-width: 96px;
        padding: 5px 3px;
        width: auto;
      }

      .combo-input:focus {
        outline: 0;
      }

      .option-list {
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        box-sizing: border-box;
        display: none;
        left: 0;
        margin-top: 4px;
        max-height: 220px;
        overflow-y: auto;
        position: absolute;
        right: 0;
        top: 100%;
        z-index: 10;
      }

      .option-list.visible {
        display: block;
      }

      .option {
        cursor: pointer;
        padding: 8px;
      }

      .option:hover,
      .option.active {
        background: #e6f3f1;
      }

      .option.empty {
        color: #64748b;
        cursor: default;
      }

      .actions {
        position: sticky;
        bottom: 0;
        display: grid;
        gap: 8px;
        background: #f7f8fa;
        padding-top: 4px;
      }

      button {
        border: 1px solid #0f766e;
        border-radius: 4px;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        padding: 8px 10px;
      }

      button.secondary {
        border-color: #bdc7d5;
        background: #fff;
        color: #1f2933;
      }

      button:disabled {
        cursor: progress;
        opacity: 0.65;
      }

      .status {
        display: none;
        line-height: 1.5;
      }

      .status.visible {
        display: block;
      }

      .status.error {
        border-color: #fca5a5;
        background: #fff5f5;
        color: #991b1b;
      }

      .status.ok {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }

      .error-list {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      .field-error {
        color: #991b1b;
        display: none;
        font-size: 12px;
        line-height: 1.4;
      }

      .field.invalid .field-error {
        display: block;
      }

      .save-line {
        color: #5b6778;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="toolbar">
        <div id="rowSummary" class="meta">請從 photos 選取一列後開啟 panel。</div>
        <div class="nav-row">
          <button id="prevButton" class="secondary" type="button">上一張</button>
          <button id="nextButton" class="secondary" type="button">下一張</button>
          <button id="activeButton" class="secondary" type="button">目前列</button>
        </div>
        <div class="row-loader">
          <input id="rowNumberInput" inputmode="numeric" aria-label="photos row number" />
          <button id="loadButton" class="secondary" type="button">載入</button>
        </div>
      </section>

      <section id="status" class="status"></section>

      <section id="photo" class="photo" hidden>
        <img id="preview" alt="" />
        <div>
          <div id="photoTitle" class="photo-title"></div>
          <div id="photoMeta" class="meta"></div>
        </div>
        <div id="photoContext" class="photo-context meta"></div>
        <div class="photo-links">
          <a id="photoUrl" href="#" target="_blank" rel="noreferrer">Flickr</a>
          <a id="previewUrl" href="#" target="_blank" rel="noreferrer">縮圖</a>
        </div>
      </section>

      <form id="form" class="form"></form>

      <section class="actions">
        <section id="saveStatus" class="status"></section>
        <button id="saveButton" type="button">儲存</button>
        <div id="saveLine" class="save-line"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#form");
      const photo = document.querySelector("#photo");
      const photoContext = document.querySelector("#photoContext");
      const photoMeta = document.querySelector("#photoMeta");
      const photoTitle = document.querySelector("#photoTitle");
      const photoUrl = document.querySelector("#photoUrl");
      const preview = document.querySelector("#preview");
      const previewUrl = document.querySelector("#previewUrl");
      const activeButton = document.querySelector("#activeButton");
      const loadButton = document.querySelector("#loadButton");
      const nextButton = document.querySelector("#nextButton");
      const prevButton = document.querySelector("#prevButton");
      const rowNumberInput = document.querySelector("#rowNumberInput");
      const rowSummary = document.querySelector("#rowSummary");
      const saveButton = document.querySelector("#saveButton");
      const saveLine = document.querySelector("#saveLine");
      const saveStatus = document.querySelector("#saveStatus");
      const status = document.querySelector("#status");

      const bootstrapState = <?!= bootstrapState ?>;
      const rowBufferBefore = 10;
      const rowBufferAfter = 10;
      const sidebarFieldNames = [
        "people_count",
        "subject_type",
        "scene_tags",
        "mood_tags",
        "recommended_uses",
        "sponsorship_items",
        "sponsorship_tags",
        "orientation",
        "has_negative_space",
        "safe_crop",
        "visual_description",
        "public_use_status",
        "priority_level",
        "collections",
        "curation_notes",
        "curation_status",
      ];
      const sidebarFieldSet = new Set(sidebarFieldNames);
      const rowCache = new Map();
      let currentState = null;
      let saveToken = 0;
      let pendingSaveCount = 0;
      let prefetchToken = 0;

      function setBusy(isBusy, mode = "load") {
        const loading = isBusy && mode === "load";
        activeButton.disabled = loading;
        loadButton.disabled = loading;
        nextButton.disabled = loading || !currentState;
        prevButton.disabled = loading || !currentState;
        saveButton.disabled = loading || !currentState || hasCurrentErrors();
      }

      function cacheState(state) {
        if (!state?.rowNumber) {
          return;
        }
        rowCache.set(Number(state.rowNumber), state);
      }

      function cacheBuffer(buffer) {
        (buffer?.photos || []).forEach(cacheState);
      }

      function bootstrapCurrentState(state) {
        return state?.current || state;
      }

      function bootstrapBuffer(state) {
        return state?.buffer || null;
      }

      function cachedRow(rowNumber) {
        return rowCache.get(Number(rowNumber)) || null;
      }

      function updateSaveLine(message = "") {
        if (message) {
          saveLine.textContent = message;
          return;
        }
        if (pendingSaveCount > 0) {
          saveLine.textContent = `背景儲存中（${pendingSaveCount}）`;
          return;
        }
        saveLine.textContent = "";
      }

      function setStatus(target, message, type = "") {
        target.textContent = "";
        target.className = "status";
        if (!message) {
          return;
        }
        target.classList.add("visible");
        if (type) {
          target.classList.add(type);
        }
        if (Array.isArray(message)) {
          const summary = document.createElement("div");
          summary.textContent = `發現 ${message.length} 個問題`;
          const list = document.createElement("ul");
          list.className = "error-list";
          message.forEach((error) => {
            const item = document.createElement("li");
            item.textContent = formatError(error);
            list.append(item);
          });
          target.append(summary, list);
          return;
        }
        target.textContent = message;
      }

      function setTopStatus(message, type = "") {
        setStatus(status, message, type);
      }

      function setSaveStatus(message, type = "") {
        setStatus(saveStatus, message, type);
      }

      function formatError(error) {
        if (error.rowNumber) {
          return `第 ${error.rowNumber} 列 ${error.fieldName}: ${error.message}`;
        }
        if (error.fieldName) {
          return `${error.fieldName}: ${error.message}`;
        }
        return error.message || String(error);
      }

      function optionElement(value, label = value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        return option;
      }

      function splitList(value) {
        return String(value || "")
          .split(";")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function findDuplicateValues(values) {
        const seen = new Set();
        const duplicates = [];
        values.forEach((value) => {
          if (seen.has(value) && !duplicates.includes(value)) {
            duplicates.push(value);
          }
          seen.add(value);
        });
        return duplicates;
      }

      function multiChoiceControl(field, value) {
        const selectedValues = [];
        splitList(value).forEach((item) => {
          if (!selectedValues.includes(item)) {
            selectedValues.push(item);
          }
        });

        const wrapper = document.createElement("div");
        wrapper.className = "multi-select";
        const hidden = document.createElement("input");
        hidden.type = "hidden";
        hidden.name = field.name;
        hidden.value = selectedValues.join(";");

        const selectedList = document.createElement("div");
        selectedList.className = "selected-list";

        const input = document.createElement("input");
        input.className = "combo-input";
        input.type = "text";
        input.autocomplete = "off";
        input.placeholder = "搜尋或選擇";

        const optionList = document.createElement("div");
        optionList.className = "option-list";

        function updateHidden() {
          hidden.value = selectedValues.join(";");
          hidden.dispatchEvent(new Event("input", { bubbles: true }));
        }

        function addValue(item) {
          if (!item || selectedValues.includes(item)) {
            return;
          }
          selectedValues.push(item);
          input.value = "";
          updateHidden();
          renderSelected();
          renderOptions();
        }

        function removeValue(item) {
          const index = selectedValues.indexOf(item);
          if (index === -1) {
            return;
          }
          selectedValues.splice(index, 1);
          updateHidden();
          renderSelected();
          renderOptions();
        }

        function matchingOptions() {
          const query = input.value.trim().toLowerCase();
          return field.options
            .filter((option) => !selectedValues.includes(option))
            .filter((option) => !query || option.toLowerCase().includes(query));
        }

        function renderSelected() {
          selectedList.textContent = "";
          selectedValues.forEach((item) => {
            const token = document.createElement("span");
            token.className = "selected-token";
            if (!field.options.includes(item)) {
              token.classList.add("unknown");
            }
            const text = document.createElement("span");
            text.textContent = item;
            const remove = document.createElement("button");
            remove.type = "button";
            remove.setAttribute("aria-label", `移除 ${item}`);
            remove.textContent = "×";
            remove.addEventListener("click", () => {
              removeValue(item);
              input.focus();
            });
            token.append(text, remove);
            selectedList.append(token);
          });
          selectedList.append(input);
        }

        function renderOptions() {
          optionList.textContent = "";
          const options = matchingOptions();
          if (options.length === 0) {
            const empty = document.createElement("div");
            empty.className = "option empty";
            empty.textContent = input.value.trim() ? "沒有符合的選項" : "沒有可選項目";
            optionList.append(empty);
            return;
          }
          options.forEach((option, index) => {
            const item = document.createElement("div");
            item.className = index === 0 ? "option active" : "option";
            item.textContent = option;
            item.addEventListener("mousedown", (event) => {
              event.preventDefault();
              addValue(option);
            });
            optionList.append(item);
          });
        }

        function openOptions() {
          renderOptions();
          optionList.classList.add("visible");
        }

        function closeOptions() {
          optionList.classList.remove("visible");
        }

        input.addEventListener("focus", openOptions);
        input.addEventListener("input", openOptions);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const first = matchingOptions()[0];
            if (first) {
              addValue(first);
              openOptions();
            }
          } else if (event.key === "Escape") {
            closeOptions();
          } else if (event.key === "Backspace" && input.value === "" && selectedValues.length > 0) {
            removeValue(selectedValues[selectedValues.length - 1]);
          }
        });
        wrapper.addEventListener("focusout", () => {
          setTimeout(() => {
            if (!wrapper.contains(document.activeElement)) {
              closeOptions();
            }
          }, 0);
        });
        selectedList.addEventListener("click", () => input.focus());

        renderSelected();
        renderOptions();
        wrapper.append(hidden, selectedList, optionList);

        return wrapper;
      }

      function fieldControl(field, value) {
        if (field.options.length > 0 && !field.multiValue) {
          const select = document.createElement("select");
          select.name = field.name;
          select.append(optionElement("", "未填寫"));
          field.options.forEach((option) => select.append(optionElement(option)));
          select.value = value;
          return select;
        }

        if (field.options.length > 0 && field.multiValue) {
          return multiChoiceControl(field, value);
        }

        if (field.multiValue || field.type === "text") {
          const textarea = document.createElement("textarea");
          textarea.name = field.name;
          textarea.value = value;
          textarea.readOnly = field.readOnly;
          return textarea;
        }

        const input = document.createElement("input");
        input.name = field.name;
        input.value = value;
        input.readOnly = field.readOnly;
        input.type = field.type === "integer" || field.type === "year" ? "text" : "text";
        return input;
      }

      function visibleFields() {
        return currentState.fields.filter((field) => sidebarFieldSet.has(field.name) && !field.readOnly);
      }

      function valuesFromForm() {
        const values = {};
        visibleFields().forEach((field) => {
          const control = form.elements[field.name];
          if (control) {
            values[field.name] = control.value;
          }
        });
        return values;
      }

      function currentRecordWithEdits() {
        return { ...(currentState?.record || {}), ...valuesFromForm() };
      }

      function normalizeFormValue(value) {
        return String(value == null ? "" : value).trim();
      }

      function hasUnsavedChanges() {
        if (!currentState) {
          return false;
        }
        const values = valuesFromForm();
        return visibleFields().some(
          (field) => normalizeFormValue(values[field.name]) !== normalizeFormValue(currentState.record[field.name]),
        );
      }

      function confirmDiscardChanges() {
        if (!hasUnsavedChanges()) {
          return true;
        }
        return window.confirm("目前這張照片有尚未儲存的編輯。切換照片會放棄這些變更，要繼續嗎？");
      }

      function markCurrentRowSavedLocally(values) {
        if (!currentState) {
          return;
        }
        const nextState = {
          ...currentState,
          record: { ...currentState.record, ...values },
        };
        currentState = nextState;
        cacheState(nextState);
      }

      function validateField(field, value, values) {
        const errors = [];
        const trimmed = String(value || "").trim();
        if (field.required && !trimmed) {
          errors.push("必填欄位不可空白");
        }
        if (!trimmed) {
          return errors;
        }
        if (field.type === "url" && !/^https?:\/\/\S+$/i.test(trimmed)) {
          errors.push("必須是 http 或 https URL");
        }
        if (field.type === "year" && !/^\d{4}$/.test(trimmed)) {
          errors.push("必須是四位數年份");
        }
        if (field.type === "integer" && !/^(0|[1-9]\d*)$/.test(trimmed)) {
          errors.push("必須是非負整數");
        }
        if (field.type === "boolean" && !["true", "false"].includes(trimmed)) {
          errors.push("必須是 true 或 false");
        }
        const listValues = field.multiValue ? splitList(trimmed) : [trimmed];
        if (field.multiValue) {
          const duplicates = findDuplicateValues(listValues);
          if (duplicates.length > 0) {
            errors.push(`不可重複填寫：${duplicates.join("、")}`);
          }
        }
        if (field.taxonomyKey) {
          listValues.forEach((item) => {
            if (!field.options.includes(item)) {
              errors.push(`未知受控字彙：${item}`);
            }
          });
        }
        if (values.curation_status === "reviewed" && currentState.reviewedRequiredFields?.includes(field.name) && !trimmed) {
          errors.push("reviewed 需要填寫此欄位");
        }
        if (values.public_use_status === "approved" && currentState.approvedRequiredFields?.includes(field.name) && !trimmed) {
          errors.push("approved 需要填寫此欄位");
        }
        return errors;
      }

      function validateForm() {
        if (!currentState) {
          return [];
        }
        const values = currentRecordWithEdits();
        const errors = [];
        const errorMap = new Map();
        visibleFields().forEach((field) => {
          const fieldErrors = validateField(field, values[field.name] || "", values);
          if (fieldErrors.length > 0) {
            errorMap.set(field.name, fieldErrors);
            fieldErrors.forEach((message) => {
              errors.push({ rowNumber: currentState.rowNumber, fieldName: field.name, message });
            });
          }
        });

        form.querySelectorAll(".field").forEach((wrapper) => {
          const fieldName = wrapper.dataset.fieldName;
          const messages = errorMap.get(fieldName) || [];
          wrapper.classList.toggle("invalid", messages.length > 0);
          const errorNode = wrapper.querySelector(".field-error");
          if (errorNode) {
            errorNode.textContent = messages.join("；");
          }
        });
        saveButton.disabled = !currentState || errors.length > 0;
        if (errors.length > 0) {
          setSaveStatus(errors, "error");
        } else if (saveStatus.classList.contains("error")) {
          setSaveStatus("");
        }
        return errors;
      }

      function hasCurrentErrors() {
        return Boolean(form.querySelector(".field.invalid"));
      }

      function render(state) {
        cacheState(state);
        currentState = state;
        rowNumberInput.value = state.rowNumber;
        rowSummary.textContent = `目前載入 photos 第 ${state.rowNumber} 列。`;
        setTopStatus("");
        form.textContent = "";

        photo.hidden = false;
        preview.src = state.record.image_preview_url || "";
        preview.hidden = !state.record.image_preview_url;
        photoTitle.textContent = state.record.photo_id || "(沒有 photo_id)";
        photoMeta.textContent = [state.record.album_title, state.record.event_year].filter(Boolean).join(" / ");
        photoContext.textContent = [
          state.record.event_name,
          state.record.public_use_status ? `公開狀態：${state.record.public_use_status}` : "",
          state.record.curation_status ? `整理狀態：${state.record.curation_status}` : "",
        ].filter(Boolean).join(" / ");
        photoUrl.href = state.record.photo_url || "#";
        previewUrl.href = state.record.image_preview_url || "#";

        state.fields.forEach((field) => {
          if (!sidebarFieldSet.has(field.name) || field.readOnly) {
            return;
          }
          const wrapper = document.createElement("div");
          wrapper.className = "field";
          wrapper.dataset.fieldName = field.name;
          const heading = document.createElement("div");
          heading.className = "field-heading";
          const label = document.createElement("label");
          label.htmlFor = `field-${field.name}`;
          label.textContent = field.required ? `${field.labelZh} *` : field.labelZh;
          const helpButton = document.createElement("button");
          helpButton.type = "button";
          helpButton.className = "help-button";
          helpButton.textContent = "?";
          helpButton.setAttribute("aria-expanded", "false");
          helpButton.setAttribute("aria-label", `顯示 ${field.labelZh} 欄位說明`);
          const control = fieldControl(field, state.record[field.name] || "");
          control.id = `field-${field.name}`;
          control.addEventListener("input", validateForm);
          control.addEventListener("change", validateForm);
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.hidden = true;
          const parts = [field.name, field.descriptionZh];
          if (field.multiValue && field.options.length > 0) {
            parts.push("可搜尋多選");
          } else if (field.multiValue) {
            parts.push("多值用 ; 分隔");
          }
          meta.textContent = parts.filter(Boolean).join(" - ");
          helpButton.addEventListener("click", () => {
            const nextHidden = !meta.hidden;
            meta.hidden = nextHidden;
            helpButton.setAttribute("aria-expanded", String(!nextHidden));
          });
          const fieldError = document.createElement("div");
          fieldError.className = "field-error";
          heading.append(label, helpButton);
          wrapper.append(heading, control, fieldError, meta);
          form.append(wrapper);
        });

        validateForm();
        if (state.errors.length > 0) {
          setSaveStatus(state.errors, "error");
        }
        setBusy(false);
      }

      function failureMessage(error) {
        const message = error.message || String(error);
        if (/Authorization is required|授權|權限不足/i.test(message)) {
          return [
            "sidebar 呼叫 Apps Script 時被回報需要授權。",
            "如果已完成授權，通常是 Google 多帳號 session 讓 sidebar iframe 使用未授權帳號。請改用已授權帳號作為第一個登入帳號，或用單一帳號的瀏覽器 profile / 無痕視窗重開 Sheet。",
            `原始錯誤：${message}`,
          ].join("\n\n");
        }
        return message;
      }

      function handleLoadFailure(error) {
        setBusy(false);
        setTopStatus(failureMessage(error), "error");
      }

      function handlePrefetchFailure() {}

      function handleSaveFailure(error) {
        pendingSaveCount = Math.max(0, pendingSaveCount - 1);
        updateSaveLine();
        setBusy(false, "save");
        setSaveStatus(failureMessage(error), "error");
      }

      function prefetchRowsAround(rowNumber) {
        const normalizedRowNumber = Number(rowNumber);
        if (!Number.isInteger(normalizedRowNumber) || normalizedRowNumber <= 1) {
          return;
        }
        const token = ++prefetchToken;
        google.script.run
          .withSuccessHandler((buffer) => {
            if (token < prefetchToken) {
              return;
            }
            cacheBuffer(buffer);
          })
          .withFailureHandler(handlePrefetchFailure)
          .getReviewPhotoBufferByRow(normalizedRowNumber, rowBufferBefore, rowBufferAfter);
      }

      function loadRow(rowNumber, options = {}) {
        if (!options.skipDirtyCheck && !confirmDiscardChanges()) {
          return;
        }
        const normalizedRowNumber = Number(rowNumber);
        const cachedState = options.useCache !== false ? cachedRow(normalizedRowNumber) : null;
        if (cachedState) {
          render(cachedState);
          prefetchRowsAround(normalizedRowNumber);
          return;
        }
        setBusy(true);
        setTopStatus("載入中...");
        setSaveStatus("");
        google.script.run
          .withSuccessHandler((state) => {
            render(state);
            prefetchRowsAround(state.rowNumber);
          })
          .withFailureHandler(handleLoadFailure)
          .getReviewPhotoByRow(rowNumber);
      }

      function loadRequestedRow() {
        loadRow(rowNumberInput.value, { useCache: false });
      }

      function loadActiveRow() {
        if (!confirmDiscardChanges()) {
          return;
        }
        setBusy(true);
        setTopStatus("讀取目前選取列...");
        setSaveStatus("");
        google.script.run
          .withSuccessHandler((state) => {
            const current = bootstrapCurrentState(state);
            cacheBuffer(bootstrapBuffer(state));
            render(current);
            prefetchRowsAround(current.rowNumber);
          })
          .withFailureHandler(handleLoadFailure)
          .getReviewPanelBootstrapState();
      }

      function saveRow() {
        if (!currentState) {
          return;
        }
        const errors = validateForm();
        if (errors.length > 0) {
          return;
        }
        const values = valuesFromForm();
        const rowNumber = currentState.rowNumber;
        const previousState = currentState;
        const token = ++saveToken;
        pendingSaveCount += 1;
        markCurrentRowSavedLocally(values);
        updateSaveLine();
        setSaveStatus("已送出背景儲存。");
        google.script.run
          .withSuccessHandler((state) => {
            pendingSaveCount = Math.max(0, pendingSaveCount - 1);
            cacheState(state);
            if (pendingSaveCount > 0) {
              updateSaveLine();
            } else {
              updateSaveLine("儲存完成。");
            }
            if (token === saveToken && currentState?.rowNumber === state.rowNumber) {
              render(state);
            }
          })
          .withFailureHandler((error) => {
            rowCache.delete(Number(rowNumber));
            if (currentState?.rowNumber === rowNumber) {
              currentState = previousState;
              cacheState(previousState);
              validateForm();
            }
            handleSaveFailure(error);
          })
          .saveReviewPhoto(rowNumber, values);
      }

      function loadRelativeRow(offset) {
        if (!currentState) {
          return;
        }
        loadRow(Number(currentState.rowNumber) + offset);
      }

      saveButton.addEventListener("click", saveRow);
      loadButton.addEventListener("click", loadRequestedRow);
      activeButton.addEventListener("click", loadActiveRow);
      prevButton.addEventListener("click", () => loadRelativeRow(-1));
      nextButton.addEventListener("click", () => loadRelativeRow(1));
      if (bootstrapState) {
        const current = bootstrapCurrentState(bootstrapState);
        cacheBuffer(bootstrapBuffer(bootstrapState));
        render(current);
        prefetchRowsAround(current.rowNumber);
      } else {
        setBusy(false);
        setTopStatus("請關閉 panel，在 photos 選取一列後重新開啟 Open review panel。", "error");
      }
    </script>
  </body>
</html>

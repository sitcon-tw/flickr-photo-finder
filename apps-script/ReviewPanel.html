<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Noto Sans TC", sans-serif;
        font-size: 13px;
        color: #1f2933;
      }

      body {
        margin: 0;
        background: #f7f8fa;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .panel {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .toolbar,
      .photo,
      .form,
      .status {
        background: #fff;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        padding: 8px;
      }

      .toolbar {
        display: grid;
        gap: 8px;
      }

      .review-context {
        display: grid;
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .nav-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 6px;
      }

      .row-loader {
        align-items: center;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 1px auto;
        gap: 6px;
      }

      .row-jump {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 4px;
        min-width: 0;
      }

      .row-loader input {
        min-width: 0;
      }

      .row-loader-divider {
        align-self: stretch;
        background: #d8dee8;
      }

      .photo {
        display: grid;
        gap: 8px;
      }

      .photo img {
        object-fit: contain;
        background: #eef1f5;
        border-radius: 4px;
        max-height: 180px;
        width: 100%;
      }

      .preview-link {
        background: #eef1f5;
        border-radius: 4px;
        display: block;
      }

      .photo-id-row {
        align-items: baseline;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .photo-title,
      .photo-album {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .photo-album {
        color: #1f2933;
        font-size: 12px;
        line-height: 1.35;
      }

      .photo-context {
        display: grid;
        gap: 4px;
      }

      .photo-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      a {
        color: #075985;
      }

      .form {
        display: grid;
        gap: 8px;
      }

      .field {
        display: grid;
        gap: 4px;
      }

      .field-heading {
        align-items: center;
        display: flex;
        gap: 6px;
        justify-content: space-between;
        position: relative;
      }

      .field.hidden {
        display: none;
      }

      .field.invalid input,
      .field.invalid select,
      .field.invalid textarea,
      .field.invalid .selected-list {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.08);
      }

      .field.warning:not(.invalid) input,
      .field.warning:not(.invalid) select,
      .field.warning:not(.invalid) textarea,
      .field.warning:not(.invalid) .selected-list {
        border-color: #f59e0b;
        box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.08);
      }

      label {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        font-weight: 700;
      }

      .field-badge {
        background: #fef3c7;
        border: 1px solid #fcd34d;
        border-radius: 4px;
        color: #92400e;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
        padding: 1px 4px;
      }

      .help-button {
        align-items: center;
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 50%;
        color: #475569;
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 700;
        height: 22px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        width: 22px;
      }

      .help-button:hover,
      .help-button:focus {
        background: #e6f3f1;
        border-color: #99c8c1;
        color: #134e4a;
      }

      .meta {
        background: #111827;
        border-radius: 4px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.22);
        color: #5b6778;
        color: #fff;
        display: none;
        font-size: 12px;
        line-height: 1.4;
        max-width: min(260px, calc(100vw - 40px));
        padding: 8px;
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        z-index: 30;
      }

      .field-heading:hover .meta,
      .field-heading:focus-within .meta {
        display: block;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        padding: 7px;
        background: #fff;
      }

      textarea {
        min-height: 62px;
        resize: vertical;
      }

      input[readonly] {
        background: #eef1f5;
        color: #4b5563;
      }

      .multi-select {
        position: relative;
      }

      .selected-list {
        align-items: center;
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        min-height: 38px;
        padding: 4px;
      }

      .selected-list:focus-within {
        border-color: #0f766e;
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
      }

      .selected-token {
        align-items: center;
        background: #e6f3f1;
        border: 1px solid #99c8c1;
        border-radius: 4px;
        color: #134e4a;
        display: inline-flex;
        font-size: 12px;
        gap: 4px;
        line-height: 1.2;
        max-width: 100%;
        min-height: 24px;
        padding: 2px 4px 2px 7px;
      }

      .selected-token.unknown {
        background: #fffbeb;
        border-color: #f59e0b;
        color: #7c2d12;
      }

      .selected-token span {
        overflow-wrap: anywhere;
      }

      .selected-token button {
        align-items: center;
        background: transparent;
        border: 0;
        border-radius: 3px;
        color: inherit;
        cursor: pointer;
        display: inline-flex;
        font-size: 16px;
        font-weight: 700;
        height: 20px;
        justify-content: center;
        line-height: 1;
        min-height: 20px;
        padding: 0;
        width: 20px;
      }

      .selected-token button:hover {
        background: rgba(15, 23, 42, 0.12);
      }

      .combo-input {
        border: 0;
        flex: 1 1 120px;
        min-width: 96px;
        padding: 5px 3px;
        width: auto;
      }

      .combo-input:focus {
        outline: 0;
      }

      .option-list {
        background: #fff;
        border: 1px solid #bdc7d5;
        border-radius: 4px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        box-sizing: border-box;
        display: none;
        left: 0;
        margin-top: 4px;
        max-height: 220px;
        overflow-y: auto;
        position: absolute;
        right: 0;
        top: 100%;
        z-index: 10;
      }

      .option-list.visible {
        display: block;
      }

      .option {
        cursor: pointer;
        padding: 8px;
      }

      .option:hover,
      .option.active {
        background: #e6f3f1;
      }

      .option.empty {
        color: #64748b;
        cursor: default;
      }

      .actions {
        position: sticky;
        bottom: 0;
        display: grid;
        gap: 8px;
        background: #f7f8fa;
        padding-top: 4px;
      }

      button {
        border: 1px solid #0f766e;
        border-radius: 4px;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        padding: 8px 10px;
      }

      button.secondary {
        border-color: #bdc7d5;
        background: #fff;
        color: #1f2933;
      }

      button:disabled {
        cursor: progress;
        opacity: 0.65;
      }

      .status {
        display: none;
        line-height: 1.5;
      }

      .status.visible {
        display: block;
      }

      .status.error {
        border-color: #fca5a5;
        background: #fff5f5;
        color: #991b1b;
      }

      .status.ok {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }

      .error-list {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      .field-error {
        color: #991b1b;
        display: none;
        font-size: 12px;
        line-height: 1.4;
      }

      .field.invalid .field-error {
        display: block;
      }

      .field-warning {
        color: #92400e;
        display: none;
        font-size: 12px;
        line-height: 1.4;
      }

      .field.warning .field-warning {
        display: block;
      }

      .save-line {
        color: #5b6778;
        font-size: 12px;
        line-height: 1.4;
      }

    </style>
  </head>
  <body>
    <main class="panel">
      <section class="toolbar">
        <div id="rowSummary" class="meta">請從 photos 選取一列後開啟 panel。</div>
        <div class="row-loader">
          <div class="row-jump">
            <input id="rowNumberInput" inputmode="numeric" aria-label="photos row number" placeholder="photos 列號，例如 12" />
            <button id="loadButton" class="secondary" type="button" title="前往指定 photos 列號">前往</button>
          </div>
          <div class="row-loader-divider" aria-hidden="true"></div>
          <button id="activeButton" class="secondary" type="button" title="載入 Google Sheets 目前選取的照片">載入表格目前選取</button>
        </div>
      </section>

      <section id="status" class="status"></section>

      <div class="review-context">
        <section id="photo" class="photo" hidden>
          <div class="nav-row">
            <button id="prevButton" class="secondary" type="button">上一張</button>
            <button id="nextButton" class="secondary" type="button">下一張</button>
          </div>
          <a id="previewUrl" class="preview-link" href="#" target="_blank" rel="noreferrer">
            <img id="preview" alt="" />
          </a>
          <div class="photo-id-row">
            <div id="photoTitle" class="photo-title"></div>
            <a id="photoUrl" href="#" target="_blank" rel="noreferrer">Flickr</a>
          </div>
          <div id="photoAlbum" class="photo-album"></div>
          <div id="photoContext" class="photo-context meta"></div>
        </section>
      </div>

      <form id="form" class="form"></form>

      <section class="actions">
        <section id="saveStatus" class="status"></section>
        <button id="completeReviewButton" type="button">完成審核並下一張</button>
        <button id="saveButton" class="secondary" type="button">儲存</button>
        <div id="saveLine" class="save-line"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#form");
      const photo = document.querySelector("#photo");
      const photoAlbum = document.querySelector("#photoAlbum");
      const photoContext = document.querySelector("#photoContext");
      const photoTitle = document.querySelector("#photoTitle");
      const photoUrl = document.querySelector("#photoUrl");
      const preview = document.querySelector("#preview");
      const previewUrl = document.querySelector("#previewUrl");
      const activeButton = document.querySelector("#activeButton");
      const completeReviewButton = document.querySelector("#completeReviewButton");
      const loadButton = document.querySelector("#loadButton");
      const nextButton = document.querySelector("#nextButton");
      const prevButton = document.querySelector("#prevButton");
      const rowNumberInput = document.querySelector("#rowNumberInput");
      const rowSummary = document.querySelector("#rowSummary");
      const saveButton = document.querySelector("#saveButton");
      const saveLine = document.querySelector("#saveLine");
      const saveStatus = document.querySelector("#saveStatus");
      const status = document.querySelector("#status");

      const bootstrapState = <?!= bootstrapState ?>;
      const rowBufferBefore = bootstrapState.current?.bufferBefore || 10;
      const rowBufferAfter = bootstrapState.current?.bufferAfter || 10;
      const rowCache = new Map();
      let currentState = null;
      let completingReview = false;
      let saveToken = 0;
      let pendingSaveCount = 0;
      let prefetchToken = 0;
      let reviewTargetMode = false;

      function setBusy(isBusy, mode = "load") {
        if (mode === "complete") {
          completingReview = isBusy;
        }
        const loading = isBusy && mode === "load";
        const blocked = loading || completingReview;
        activeButton.disabled = blocked;
        loadButton.disabled = blocked;
        nextButton.disabled = blocked || !currentState;
        prevButton.disabled = blocked || !currentState;
        saveButton.disabled = blocked || !currentState || hasCurrentErrors();
        completeReviewButton.disabled = blocked || !currentState || hasCurrentErrors();
      }

      function cacheState(state) {
        if (!state?.rowNumber) {
          return;
        }
        rowCache.set(Number(state.rowNumber), state);
      }

      function cacheBuffer(buffer) {
        (buffer?.photos || []).forEach(cacheState);
      }

      function bootstrapCurrentState(state) {
        return state?.current || state;
      }

      function bootstrapBuffer(state) {
        return state?.buffer || null;
      }

      function cachedRow(rowNumber) {
        return rowCache.get(Number(rowNumber)) || null;
      }

      function updateSaveLine(message = "") {
        if (message) {
          saveLine.textContent = message;
          return;
        }
        if (pendingSaveCount > 0) {
          saveLine.textContent = `背景儲存中（${pendingSaveCount}）`;
          return;
        }
        saveLine.textContent = "";
      }

      function setStatus(target, message, type = "") {
        target.textContent = "";
        target.className = "status";
        if (!message) {
          return;
        }
        target.classList.add("visible");
        if (type) {
          target.classList.add(type);
        }
        if (Array.isArray(message)) {
          const summary = document.createElement("div");
          summary.textContent = `發現 ${message.length} 個問題`;
          const list = document.createElement("ul");
          list.className = "error-list";
          message.forEach((error) => {
            const item = document.createElement("li");
            item.textContent = formatError(error);
            list.append(item);
          });
          target.append(summary, list);
          return;
        }
        target.textContent = message;
      }

      function setTopStatus(message, type = "") {
        setStatus(status, message, type);
      }

      function setSaveStatus(message, type = "") {
        setStatus(saveStatus, message, type);
      }

      function formatError(error) {
        if (error.rowNumber) {
          return `第 ${error.rowNumber} 列 ${error.fieldName}: ${error.message}`;
        }
        if (error.fieldName) {
          return `${error.fieldName}: ${error.message}`;
        }
        return error.message || String(error);
      }

      function optionElement(value, label = value) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        return option;
      }

      function optionLabel(field, value) {
        return field.optionLabels?.[value] || value;
      }

      function fieldByName(fieldName) {
        return currentState?.fields?.find((field) => field.name === fieldName) || null;
      }

      function optionLabelForField(fieldName, value) {
        const field = fieldByName(fieldName);
        return field ? optionLabel(field, value) : value;
      }

      function splitList(value) {
        return String(value || "")
          .split(";")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function findDuplicateValues(values) {
        const seen = new Set();
        const duplicates = [];
        values.forEach((value) => {
          if (seen.has(value) && !duplicates.includes(value)) {
            duplicates.push(value);
          }
          seen.add(value);
        });
        return duplicates;
      }

      function multiChoiceControl(field, value) {
        const selectedValues = [];
        splitList(value).forEach((item) => {
          if (!selectedValues.includes(item)) {
            selectedValues.push(item);
          }
        });

        const wrapper = document.createElement("div");
        wrapper.className = "multi-select";
        const hidden = document.createElement("input");
        hidden.type = "hidden";
        hidden.name = field.name;
        hidden.value = selectedValues.join(";");

        const selectedList = document.createElement("div");
        selectedList.className = "selected-list";

        const input = document.createElement("input");
        input.className = "combo-input";
        input.type = "text";
        input.autocomplete = "off";
        input.placeholder = "搜尋或選擇";

        const optionList = document.createElement("div");
        optionList.className = "option-list";

        function updateHidden() {
          hidden.value = selectedValues.join(";");
          hidden.dispatchEvent(new Event("input", { bubbles: true }));
        }

        function addValue(item) {
          if (!item || selectedValues.includes(item)) {
            return;
          }
          selectedValues.push(item);
          input.value = "";
          updateHidden();
          renderSelected();
          renderOptions();
        }

        function removeValue(item) {
          const index = selectedValues.indexOf(item);
          if (index === -1) {
            return;
          }
          selectedValues.splice(index, 1);
          updateHidden();
          renderSelected();
          renderOptions();
        }

        function matchingOptions() {
          const query = input.value.trim().toLowerCase();
          return field.options
            .filter((option) => !selectedValues.includes(option))
            .filter((option) => {
              const label = optionLabel(field, option).toLowerCase();
              return !query || option.toLowerCase().includes(query) || label.includes(query);
            });
        }

        function renderSelected() {
          selectedList.textContent = "";
          selectedValues.forEach((item) => {
            const token = document.createElement("span");
            token.className = "selected-token";
            if (!field.options.includes(item)) {
              token.classList.add("unknown");
            }
            const text = document.createElement("span");
            const label = optionLabel(field, item);
            text.textContent = label;
            const remove = document.createElement("button");
            remove.type = "button";
            remove.setAttribute("aria-label", `移除 ${label}`);
            remove.textContent = "×";
            remove.addEventListener("click", () => {
              removeValue(item);
              input.focus();
            });
            token.append(text, remove);
            selectedList.append(token);
          });
          selectedList.append(input);
        }

        function renderOptions() {
          optionList.textContent = "";
          const options = matchingOptions();
          if (options.length === 0) {
            const empty = document.createElement("div");
            empty.className = "option empty";
            empty.textContent = input.value.trim() ? "沒有符合的選項" : "沒有可選項目";
            optionList.append(empty);
            return;
          }
          options.forEach((option, index) => {
            const item = document.createElement("div");
            item.className = index === 0 ? "option active" : "option";
            item.textContent = optionLabel(field, option);
            item.title = option;
            item.addEventListener("mousedown", (event) => {
              event.preventDefault();
              addValue(option);
            });
            optionList.append(item);
          });
        }

        function openOptions() {
          renderOptions();
          optionList.classList.add("visible");
        }

        function closeOptions() {
          optionList.classList.remove("visible");
        }

        input.addEventListener("focus", openOptions);
        input.addEventListener("input", openOptions);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const first = matchingOptions()[0];
            if (first) {
              addValue(first);
              openOptions();
            }
          } else if (event.key === "Escape") {
            closeOptions();
          } else if (event.key === "Backspace" && input.value === "" && selectedValues.length > 0) {
            removeValue(selectedValues[selectedValues.length - 1]);
          }
        });
        wrapper.addEventListener("focusout", () => {
          setTimeout(() => {
            if (!wrapper.contains(document.activeElement)) {
              closeOptions();
            }
          }, 0);
        });
        selectedList.addEventListener("click", () => input.focus());

        renderSelected();
        renderOptions();
        wrapper.append(hidden, selectedList, optionList);

        return wrapper;
      }

      function fieldControl(field, value) {
        if (field.options.length > 0 && !field.multiValue) {
          const select = document.createElement("select");
          select.name = field.name;
          select.append(optionElement("", "未填寫"));
          field.options.forEach((option) => select.append(optionElement(option, optionLabel(field, option))));
          select.value = value;
          return select;
        }

        if (field.options.length > 0 && field.multiValue) {
          return multiChoiceControl(field, value);
        }

        if (field.multiValue || field.type === "text") {
          const textarea = document.createElement("textarea");
          textarea.name = field.name;
          textarea.value = value;
          textarea.readOnly = field.readOnly;
          return textarea;
        }

        const input = document.createElement("input");
        input.name = field.name;
        input.value = value;
        input.readOnly = field.readOnly;
        input.type = field.type === "integer" || field.type === "year" ? "text" : "text";
        return input;
      }

      function visibleFields() {
        return currentState.fields.filter((field) => !field.readOnly);
      }

      function valuesFromForm() {
        const values = {};
        visibleFields().forEach((field) => {
          const control = form.elements[field.name];
          if (control) {
            values[field.name] = control.value;
          }
        });
        return values;
      }

      function currentRecordWithEdits() {
        return { ...(currentState?.record || {}), ...valuesFromForm() };
      }

      function currentValuesForValidation() {
        const values = currentRecordWithEdits();
        if (reviewTargetMode) {
          values.curation_status = "reviewed";
        }
        return values;
      }

      function normalizeFormValue(value) {
        return String(value == null ? "" : value).trim();
      }

      function hasUnsavedChanges() {
        if (!currentState) {
          return false;
        }
        const values = valuesFromForm();
        return visibleFields().some(
          (field) => normalizeFormValue(values[field.name]) !== normalizeFormValue(currentState.record[field.name]),
        );
      }

      function confirmDiscardChanges() {
        if (!hasUnsavedChanges()) {
          return true;
        }
        return window.confirm("目前這張照片有尚未儲存的編輯。切換照片會放棄這些變更，要繼續嗎？");
      }

      function markCurrentRowSavedLocally(values) {
        if (!currentState) {
          return;
        }
        const nextState = {
          ...currentState,
          record: { ...currentState.record, ...values },
        };
        currentState = nextState;
        cacheState(nextState);
      }

      function isReviewedRequiredField(field) {
        return Boolean(currentState?.reviewedRequiredFields?.includes(field.name));
      }

      function isBlankValue(value) {
        return !String(value || "").trim();
      }

      function validationMessage(key) {
        return currentState?.validationMessages?.[key] || key;
      }

      function validateField(field, value, values) {
        const errors = [];
        const trimmed = String(value || "").trim();
        if (field.required && !trimmed) {
          errors.push(validationMessage("required"));
        }
        if (!trimmed) {
          if (values.curation_status === "reviewed" && isReviewedRequiredField(field)) {
            errors.push(validationMessage("completionRequired"));
          }
          return errors;
        }
        if (field.type === "url" && !/^https?:\/\/\S+$/i.test(trimmed)) {
          errors.push(validationMessage("invalidUrl"));
        }
        if (field.type === "year" && !/^\d{4}$/.test(trimmed)) {
          errors.push(validationMessage("invalidYear"));
        }
        if (field.type === "integer" && !/^(0|[1-9]\d*)$/.test(trimmed)) {
          errors.push(validationMessage("invalidInteger"));
        }
        if (field.type === "boolean" && !["true", "false"].includes(trimmed)) {
          errors.push(validationMessage("invalidBoolean"));
        }
        const listValues = field.multiValue ? splitList(trimmed) : [trimmed];
        if (field.multiValue) {
          const duplicates = findDuplicateValues(listValues);
          if (duplicates.length > 0) {
            errors.push(`${validationMessage("duplicateListPrefix")}${duplicates.join("、")}`);
          }
        }
        if (field.taxonomyKey) {
          listValues.forEach((item) => {
            if (!field.options.includes(item)) {
              errors.push(`${validationMessage("unknownTaxonomyPrefix")}${item}`);
            }
          });
        }
        return errors;
      }

      function validateCompletionWarning(field, value, values) {
        if (values.curation_status === "reviewed") {
          return [];
        }
        if (!isReviewedRequiredField(field) || !isBlankValue(value)) {
          return [];
        }
        return [validationMessage("completionWarning")];
      }

      function validateForm() {
        if (!currentState) {
          return [];
        }
        const values = currentValuesForValidation();
        const errors = [];
        const errorMap = new Map();
        const warningMap = new Map();
        visibleFields().forEach((field) => {
          const fieldErrors = validateField(field, values[field.name] || "", values);
          if (fieldErrors.length > 0) {
            errorMap.set(field.name, fieldErrors);
            fieldErrors.forEach((message) => {
              errors.push({ rowNumber: currentState.rowNumber, fieldName: field.name, message });
            });
          }
          const fieldWarnings = validateCompletionWarning(field, values[field.name] || "", values);
          if (fieldWarnings.length > 0) {
            warningMap.set(field.name, fieldWarnings);
          }
        });

        form.querySelectorAll(".field").forEach((wrapper) => {
          const fieldName = wrapper.dataset.fieldName;
          const messages = errorMap.get(fieldName) || [];
          const warnings = warningMap.get(fieldName) || [];
          wrapper.classList.toggle("invalid", messages.length > 0);
          wrapper.classList.toggle("warning", messages.length === 0 && warnings.length > 0);
          const errorNode = wrapper.querySelector(".field-error");
          if (errorNode) {
            errorNode.textContent = messages.join("；");
          }
          const warningNode = wrapper.querySelector(".field-warning");
          if (warningNode) {
            warningNode.textContent = warnings.join("；");
          }
        });
        const hasErrors = errors.length > 0;
        saveButton.disabled = completingReview || !currentState || hasErrors;
        completeReviewButton.disabled = completingReview || !currentState || hasErrors;
        if (errors.length > 0) {
          setSaveStatus(errors, "error");
        } else if (saveStatus.classList.contains("error")) {
          setSaveStatus("");
        }
        return errors;
      }

      function hasCurrentErrors() {
        return Boolean(form.querySelector(".field.invalid"));
      }

      function focusFirstIssue(errors) {
        const fieldName = errors.find((error) => error.fieldName)?.fieldName;
        const wrapper = Array.from(form.querySelectorAll(".field")).find((field) => field.dataset.fieldName === fieldName);
        if (!wrapper) {
          return;
        }
        wrapper.scrollIntoView({ block: "center", behavior: "smooth" });
        const control = wrapper.querySelector("input:not([type='hidden']), select, textarea, .combo-input");
        if (control) {
          control.focus({ preventScroll: true });
        }
      }

      function displayImageUrl(url) {
        const text = String(url || "");
        if (!/\/\/live\.staticflickr\.com\//.test(text)) {
          return text;
        }
        return text.replace(/_([sqtm])(\.[a-z0-9]+)$/i, "_n$2");
      }

      function render(state) {
        cacheState(state);
        currentState = state;
        reviewTargetMode = false;
        rowNumberInput.value = state.rowNumber;
        rowSummary.textContent = `目前載入 photos 第 ${state.rowNumber} 列。`;
        setTopStatus("");
        form.textContent = "";

        photo.hidden = false;
        const imageUrl = displayImageUrl(state.record.image_preview_url);
        preview.src = imageUrl || "";
        previewUrl.hidden = !state.record.image_preview_url;
        photoTitle.textContent = state.record.photo_id || "(沒有 photo_id)";
        photoAlbum.textContent = state.record.album_title || "(沒有 album_title)";
        photoContext.textContent = [
          state.record.event_name,
          state.record.event_year,
          state.record.public_use_status ? `公開狀態：${optionLabelForField("public_use_status", state.record.public_use_status)}` : "",
          state.record.curation_status ? `整理狀態：${optionLabelForField("curation_status", state.record.curation_status)}` : "",
        ].filter(Boolean).join(" / ");
        photoUrl.href = state.record.photo_url || "#";
        previewUrl.href = imageUrl || state.record.image_preview_url || "#";

        state.fields.forEach((field) => {
          if (field.readOnly) {
            return;
          }
          const wrapper = document.createElement("div");
          wrapper.className = "field";
          wrapper.dataset.fieldName = field.name;
          const heading = document.createElement("div");
          heading.className = "field-heading";
          const label = document.createElement("label");
          label.htmlFor = `field-${field.name}`;
          label.textContent = field.required ? `${field.labelZh} *` : field.labelZh;
          if (isReviewedRequiredField(field)) {
            const badge = document.createElement("span");
            badge.className = "field-badge";
            badge.textContent = "完成必填";
            label.append(badge);
          }
          const helpButton = document.createElement("button");
          helpButton.type = "button";
          helpButton.className = "help-button";
          helpButton.textContent = "?";
          helpButton.setAttribute("aria-label", `${field.labelZh} 欄位說明`);
          const control = fieldControl(field, state.record[field.name] || "");
          control.id = `field-${field.name}`;
          control.addEventListener("input", validateForm);
          control.addEventListener("change", validateForm);
          const meta = document.createElement("div");
          meta.className = "meta";
          const parts = [field.name, field.descriptionZh];
          if (field.multiValue && field.options.length > 0) {
            parts.push("可搜尋多選");
          } else if (field.multiValue) {
            parts.push("多值用 ; 分隔");
          }
          meta.textContent = parts.filter(Boolean).join(" - ");
          const fieldError = document.createElement("div");
          fieldError.className = "field-error";
          const fieldWarning = document.createElement("div");
          fieldWarning.className = "field-warning";
          heading.append(label, helpButton, meta);
          wrapper.append(heading, control, fieldError, fieldWarning);
          form.append(wrapper);
        });

        validateForm();
        if (state.errors.length > 0) {
          setSaveStatus(state.errors, "error");
        }
        setBusy(false);
      }

      function failureMessage(error) {
        const message = error.message || String(error);
        if (/Authorization is required|授權|權限不足/i.test(message)) {
          return [
            "sidebar 呼叫 Apps Script 時被回報需要授權。",
            "如果已完成授權，通常是 Google 多帳號 session 讓 sidebar iframe 使用未授權帳號。請改用已授權帳號作為第一個登入帳號，或用單一帳號的瀏覽器 profile / 無痕視窗重開 Sheet。",
            `原始錯誤：${message}`,
          ].join("\n\n");
        }
        return message;
      }

      function handleLoadFailure(error) {
        setBusy(false);
        setTopStatus(failureMessage(error), "error");
      }

      function handlePrefetchFailure() {}

      function prefetchRowsAround(rowNumber) {
        const normalizedRowNumber = Number(rowNumber);
        if (!Number.isInteger(normalizedRowNumber) || normalizedRowNumber <= 1) {
          return;
        }
        const token = ++prefetchToken;
        google.script.run
          .withSuccessHandler((buffer) => {
            if (token < prefetchToken) {
              return;
            }
            cacheBuffer(buffer);
          })
          .withFailureHandler(handlePrefetchFailure)
          .getReviewPhotoBufferByRow(normalizedRowNumber, rowBufferBefore, rowBufferAfter);
      }

      function loadRow(rowNumber, options = {}) {
        if (!options.skipDirtyCheck && !confirmDiscardChanges()) {
          return;
        }
        const normalizedRowNumber = Number(rowNumber);
        const cachedState = options.useCache !== false ? cachedRow(normalizedRowNumber) : null;
        if (cachedState) {
          render(cachedState);
          prefetchRowsAround(normalizedRowNumber);
          return;
        }
        setBusy(true);
        setTopStatus("載入中...");
        setSaveStatus("");
        google.script.run
          .withSuccessHandler((state) => {
            render(state);
            prefetchRowsAround(state.rowNumber);
          })
          .withFailureHandler(handleLoadFailure)
          .getReviewPhotoByRow(rowNumber);
      }

      function loadRequestedRow() {
        loadRow(rowNumberInput.value, { useCache: false });
      }

      function loadActiveRow() {
        if (!confirmDiscardChanges()) {
          return;
        }
        setBusy(true);
        setTopStatus("讀取目前選取列...");
        setSaveStatus("");
        google.script.run
          .withSuccessHandler((state) => {
            const current = bootstrapCurrentState(state);
            cacheBuffer(bootstrapBuffer(state));
            render(current);
            prefetchRowsAround(current.rowNumber);
          })
          .withFailureHandler(handleLoadFailure)
          .getReviewPanelBootstrapState();
      }

      function saveValues(values, options = {}) {
        if (!currentState) {
          return;
        }
        const rowNumber = currentState.rowNumber;
        const previousState = currentState;
        const token = ++saveToken;
        pendingSaveCount += 1;
        markCurrentRowSavedLocally(values);
        updateSaveLine();
        if (options.showPendingStatus !== false) {
          setSaveStatus(options.pendingMessage || "已送出背景儲存。");
        }
        google.script.run
          .withSuccessHandler((state) => {
            pendingSaveCount = Math.max(0, pendingSaveCount - 1);
            if (state.errors?.length > 0) {
              rowCache.delete(Number(rowNumber));
              if (currentState?.rowNumber === rowNumber) {
                currentState = { ...state, record: { ...state.record, ...values } };
                render(currentState);
                setSaveStatus(state.errors, "error");
              } else {
                updateSaveLine(`第 ${rowNumber} 列背景儲存失敗：${state.errors.map(formatError).join("；")}`);
              }
              if (options.completeReview) {
                if (options.releaseCompleteBusy !== false) {
                  setBusy(false, "complete");
                }
                reviewTargetMode = false;
              }
              if (currentState?.rowNumber === rowNumber) {
                updateSaveLine();
              }
              return;
            }
            cacheState(state);
            if (pendingSaveCount > 0) {
              updateSaveLine();
            } else {
              updateSaveLine(options.successMessage || "儲存完成。");
            }
            if (options.completeReview) {
              if (options.releaseCompleteBusy !== false) {
                setBusy(false, "complete");
              }
              reviewTargetMode = false;
              if (options.loadNextOnSuccess !== false) {
                loadRow(Number(state.rowNumber) + 1, { skipDirtyCheck: true });
              }
              return;
            }
            if (token === saveToken && currentState?.rowNumber === state.rowNumber) {
              render(state);
            }
          })
          .withFailureHandler((error) => {
            pendingSaveCount = Math.max(0, pendingSaveCount - 1);
            rowCache.delete(Number(rowNumber));
            if (currentState?.rowNumber === rowNumber) {
              currentState = previousState;
              cacheState(previousState);
              validateForm();
              setSaveStatus(failureMessage(error), "error");
            } else {
              updateSaveLine(`第 ${rowNumber} 列背景儲存失敗：${failureMessage(error)}`);
            }
            if (options.completeReview) {
              if (options.releaseCompleteBusy !== false) {
                setBusy(false, "complete");
              }
              reviewTargetMode = false;
            }
            if (currentState?.rowNumber === rowNumber) {
              updateSaveLine();
            }
          })
          .saveReviewPhoto(rowNumber, values);
      }

      function saveRow() {
        if (!currentState) {
          return;
        }
        reviewTargetMode = false;
        const errors = validateForm();
        if (errors.length > 0) {
          return;
        }
        saveValues(valuesFromForm());
      }

      function completeReviewAndLoadNext() {
        if (!currentState) {
          return;
        }
        reviewTargetMode = true;
        const errors = validateForm();
        if (errors.length > 0) {
          setSaveStatus(errors, "error");
          focusFirstIssue(errors);
          return;
        }
        const values = { ...valuesFromForm(), curation_status: "reviewed" };
        const nextRowNumber = Number(currentState.rowNumber) + 1;
        saveValues(values, {
          completeReview: true,
          loadNextOnSuccess: false,
          pendingMessage: "正在完成審核並儲存...",
          releaseCompleteBusy: false,
          successMessage: "已完成審核。",
          showPendingStatus: false,
        });
        reviewTargetMode = false;
        setSaveStatus("");
        loadRow(nextRowNumber, { skipDirtyCheck: true });
      }

      function loadRelativeRow(offset) {
        if (!currentState) {
          return;
        }
        loadRow(Number(currentState.rowNumber) + offset);
      }

      saveButton.addEventListener("click", saveRow);
      completeReviewButton.addEventListener("click", completeReviewAndLoadNext);
      loadButton.addEventListener("click", loadRequestedRow);
      activeButton.addEventListener("click", loadActiveRow);
      prevButton.addEventListener("click", () => loadRelativeRow(-1));
      nextButton.addEventListener("click", () => loadRelativeRow(1));
      if (bootstrapState) {
        const current = bootstrapCurrentState(bootstrapState);
        cacheBuffer(bootstrapBuffer(bootstrapState));
        render(current);
        prefetchRowsAround(current.rowNumber);
      } else {
        setBusy(false);
        setTopStatus("請關閉 panel，在 photos 選取一列後重新執行開始整理照片。", "error");
      }
    </script>
  </body>
</html>
